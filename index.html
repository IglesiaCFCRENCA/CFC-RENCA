<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Iglesia CFC Renca</title>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<style>
  :root{
    --bg:#0b0b0c;
    --bg2:#141416;
    --card:#1b1b1e;
    --card2:#222226;
    --line:#2c2c30;
    --white:#f5f5f5;
    --gray:#9a9a9f;
    --gray-dim:#6b6b70;
    --accent:#e8e8ea;
    --danger:#c0524a;
    --ok:#5a8a6b;
    --highlight:#ffb648;
    --radius:14px;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:radial-gradient(circle at 50% 0%, #1a1a1d 0%, #0b0b0c 60%);
    color:var(--white);
    font-family:'Helvetica Neue',Arial,sans-serif;
    min-height:100vh;
    -webkit-font-smoothing:antialiased;
  }
  #app{max-width:520px;margin:0 auto;padding-bottom:90px;min-height:100vh;position:relative;}

  /* HEADER */
  .header{
    display:flex;align-items:center;gap:12px;
    padding:18px 16px 14px;
    border-bottom:1px solid var(--line);
    background:linear-gradient(180deg,#151517,#0e0e10);
  }
  .header img{width:46px;height:46px;border-radius:50%;border:1px solid #333;}
  .header .htxt h1{font-size:16px;margin:0;letter-spacing:.5px;font-weight:700;}
  .header .htxt p{margin:2px 0 0;font-size:11px;color:var(--gray);letter-spacing:.5px;text-transform:uppercase;}
  .header .badge{margin-left:auto;font-size:10px;color:var(--gray-dim);border:1px solid var(--line);padding:4px 8px;border-radius:20px;}

  /* SETUP SCREEN */
  .setup-wrap{padding:40px 24px;display:flex;flex-direction:column;align-items:center;text-align:center;}
  .setup-wrap img{width:90px;height:90px;border-radius:50%;margin-bottom:18px;border:1px solid #333;}
  .setup-wrap h2{font-size:20px;margin:0 0 6px;}
  .setup-wrap p{color:var(--gray);font-size:13px;line-height:1.5;margin:0 0 24px;max-width:340px;}
  .field{width:100%;max-width:340px;text-align:left;margin-bottom:14px;}
  .field label{display:block;font-size:11px;color:var(--gray);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px;}
  input,select,textarea{
    width:100%;background:var(--card);border:1px solid var(--line);color:var(--white);
    padding:12px 14px;border-radius:10px;font-size:14px;outline:none;
  }
  input:focus,select:focus,textarea:focus{border-color:#555;}
  textarea{resize:vertical;min-height:60px;font-family:inherit;}
  .btn{
    width:100%;max-width:340px;padding:13px;border-radius:10px;border:none;
    background:var(--white);color:#111;font-weight:700;font-size:14px;letter-spacing:.3px;
    cursor:pointer;margin-top:6px;transition:opacity .15s;
  }
  .btn:active{opacity:.7;}
  .btn-outline{background:transparent;border:1px solid var(--line);color:var(--white);}
  .btn-danger{background:var(--danger);color:#fff;}
  .btn-sm{width:auto;padding:8px 14px;font-size:12px;}
  .error-msg{color:var(--danger);font-size:12px;margin-top:8px;}
  .hint{font-size:11px;color:var(--gray-dim);margin-top:8px;max-width:340px;}

  /* TABS */
  .tabbar{
    position:fixed;bottom:0;left:50%;transform:translateX(-50%);
    width:100%;max-width:520px;
    display:flex;justify-content:space-around;
    background:rgba(15,15,17,.97);backdrop-filter:blur(8px);
    border-top:1px solid var(--line);
    padding:8px 4px calc(8px + env(safe-area-inset-bottom));
    z-index:50;
  }
  .tab-btn{
    background:none;border:none;color:var(--gray-dim);font-size:9.5px;
    display:flex;flex-direction:column;align-items:center;gap:3px;
    padding:6px 4px;cursor:pointer;flex:1;letter-spacing:.2px;
  }
  .tab-btn .ic{font-size:18px;}
  .tab-btn.active{color:var(--white);}

  /* CONTENT */
  .view{padding:16px;display:none;animation:fade .25s ease;}
  .view.active{display:block;}
  @keyframes fade{from{opacity:0;transform:translateY(4px);}to{opacity:1;transform:translateY(0);}}

  .section-title{
    font-size:13px;text-transform:uppercase;letter-spacing:1px;color:var(--gray);
    margin:18px 0 10px;display:flex;align-items:center;justify-content:space-between;
  }
  .section-title:first-child{margin-top:0;}

  .card{
    background:var(--card);border:1px solid var(--line);border-radius:var(--radius);
    padding:14px;margin-bottom:10px;
  }
  .item-row{
    display:flex;gap:10px;align-items:flex-start;
    padding:10px 0;border-bottom:1px solid var(--line);
  }
  .item-row:last-child{border-bottom:none;}
  .time-chip{
    background:var(--card2);border:1px solid var(--line);border-radius:8px;
    padding:5px 8px;font-size:11px;font-weight:700;min-width:46px;text-align:center;color:var(--white);
    white-space:nowrap;
  }
  .item-body{flex:1;}
  .item-title{font-size:14px;font-weight:700;margin:0 0 2px;}
  .item-resp{font-size:11.5px;color:var(--gray);margin:0 0 4px;}
  .item-notes{font-size:12px;color:var(--gray-dim);margin:0;line-height:1.4;white-space:pre-line;}

  /* ─── ROLE CARD: diseño imagen 2 ─── */
  .role-card{
    background:var(--card);border:1px solid var(--line);border-radius:var(--radius);
    margin-bottom:12px;overflow:hidden;
  }
  .role-head{
    padding:13px 16px;font-size:14px;font-weight:800;text-transform:uppercase;
    letter-spacing:1.2px;background:#252528;color:var(--white);
    border-bottom:1px solid var(--line);
  }
  .role-line{
    display:flex;justify-content:space-between;align-items:center;
    padding:12px 16px;border-top:1px solid var(--line);font-size:13.5px;
  }
  .role-line .rol{color:var(--gray);font-size:12px;}
  .role-line .nom{font-weight:700;}

  .aviso-card{
    background:var(--card);border:1px solid var(--line);border-radius:var(--radius);
    padding:13px 14px;margin-bottom:8px;font-size:13.5px;line-height:1.45;
    display:flex;gap:10px;align-items:flex-start;
  }
  .aviso-dot{width:6px;height:6px;border-radius:50%;background:var(--accent);margin-top:6px;flex-shrink:0;}

  .act-card{
    background:var(--card);border:1px solid var(--line);border-radius:var(--radius);
    padding:14px;margin-bottom:10px;
  }
  .act-date{
    display:inline-block;background:var(--card2);border:1px solid var(--line);
    font-size:11px;font-weight:700;padding:4px 9px;border-radius:7px;margin-bottom:8px;color:var(--white);
  }
  .act-title{font-size:14.5px;font-weight:700;margin:0 0 4px;}
  .act-note{font-size:12.5px;color:var(--gray);margin:0;line-height:1.4;white-space:pre-line;}

  .empty{
    text-align:center;color:var(--gray-dim);font-size:13px;padding:40px 10px;
  }

  /* lock screen */
  .lock-wrap{padding:50px 24px;text-align:center;}
  .lock-wrap .ic{font-size:34px;margin-bottom:14px;}
  .lock-wrap h3{margin:0 0 6px;font-size:17px;}
  .lock-wrap p{color:var(--gray);font-size:13px;margin:0 0 20px;}
  .pin-dots{display:flex;gap:10px;justify-content:center;margin:18px 0;}
  .pin-dots span{width:11px;height:11px;border-radius:50%;border:1px solid var(--gray-dim);}
  .pin-dots span.filled{background:var(--white);border-color:var(--white);}
  .keypad{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;max-width:260px;margin:0 auto;}
  .keypad button{
    background:var(--card);border:1px solid var(--line);color:var(--white);
    font-size:18px;padding:16px 0;border-radius:50%;cursor:pointer;
  }
  .keypad button:active{background:var(--card2);}
  .keypad .ghost{background:none;border:none;}

  /* admin */
  .admin-bar{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;}
  .admin-bar h2{font-size:16px;margin:0;}
  .small-link{font-size:11px;color:var(--gray);text-decoration:underline;cursor:pointer;background:none;border:none;}
  .form-grid{display:grid;gap:10px;margin-bottom:12px;}
  .row2{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
  .admin-item{
    background:var(--card);border:1px solid var(--line);border-radius:12px;
    padding:12px;margin-bottom:8px;
  }
  .admin-item-top{display:flex;justify-content:space-between;gap:8px;align-items:flex-start;}
  .iconbtn{
    background:var(--card2);border:1px solid var(--line);color:var(--gray);
    width:30px;height:30px;border-radius:8px;cursor:pointer;font-size:13px;flex-shrink:0;
  }
  .iconbtn.del{color:#d98a84;}
  .tag{
    display:inline-block;font-size:10px;background:var(--card2);border:1px solid var(--line);
    padding:2px 7px;border-radius:6px;color:var(--gray);margin-bottom:4px;
  }
  .subtabs{display:flex;gap:6px;overflow-x:auto;margin-bottom:14px;padding-bottom:2px;}
  .subtab{
    background:var(--card);border:1px solid var(--line);color:var(--gray);
    padding:7px 13px;border-radius:20px;font-size:12px;white-space:nowrap;cursor:pointer;
  }
  .subtab.active{background:var(--white);color:#111;border-color:var(--white);font-weight:700;}

  .toast{
    position:fixed;bottom:96px;left:50%;transform:translateX(-50%);
    background:var(--white);color:#111;padding:10px 18px;border-radius:30px;
    font-size:12.5px;font-weight:600;z-index:200;opacity:0;pointer-events:none;
    transition:opacity .25s, transform .25s;
  }
  .toast.show{opacity:1;transform:translateX(-50%) translateY(-6px);}

  .loading-screen{
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    min-height:100vh;gap:14px;
  }
  .spinner{
    width:30px;height:30px;border-radius:50%;border:2px solid var(--line);
    border-top-color:var(--white);animation:spin 0.8s linear infinite;
  }
  @keyframes spin{to{transform:rotate(360deg);}}

  .modal-bg{
    position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:300;
    display:flex;align-items:flex-end;justify-content:center;
  }
  .modal{
    background:var(--bg2);width:100%;max-width:520px;border-radius:18px 18px 0 0;
    padding:20px 16px calc(20px + env(safe-area-inset-bottom));
    max-height:85vh;overflow-y:auto;border-top:1px solid var(--line);
  }
  .modal h3{margin:0 0 14px;font-size:15px;}
  .modal-actions{display:flex;gap:10px;margin-top:6px;}
  .modal-actions .btn{margin-top:0;}

  .gray-pill{font-size:10.5px;color:var(--gray-dim);text-align:center;margin-top:14px;}

  /* zonas / chips de servidores */
  .chip-list{display:flex;flex-wrap:wrap;gap:6px;}
  .chip{
    display:inline-flex;align-items:center;gap:6px;
    background:var(--card2);border:1px solid var(--line);border-radius:20px;
    padding:5px 8px 5px 11px;font-size:12px;color:var(--white);
  }
  .chip-x{
    background:none;border:none;color:var(--gray-dim);cursor:pointer;
    font-size:10px;width:18px;height:18px;border-radius:50%;padding:0;
  }
  .chip-x:active{background:var(--line);}
  .zona-card .role-head{display:flex;}

  /* búsqueda calendario */
  .search-box{margin-bottom:12px;}

  /* calendario de turnos mensuales */
  .day-card{
    background:var(--card);border:1px solid var(--line);border-radius:var(--radius);
    padding:14px;margin-bottom:10px;
  }
  .day-title{font-size:13px;font-weight:700;text-transform:capitalize;margin:0 0 8px;color:var(--white);
    background:var(--card2);display:inline-block;padding:4px 10px;border-radius:8px;border:1px solid var(--line);}
  .day-zona{font-size:10.5px;text-transform:uppercase;letter-spacing:.5px;color:var(--gray-dim);margin:10px 0 4px;}
  .day-zona:first-of-type{margin-top:0;}
  .day-line{display:flex;justify-content:space-between;gap:10px;font-size:13px;padding:5px 6px;border-radius:8px;}
  .day-line.me{background:rgba(255,182,72,.22);border:1px solid rgba(255,182,72,.55);}
  .day-line.me .nom{color:var(--highlight);}

  /* icono del selector de fecha/mes nativo, más visible sobre fondo oscuro */
  input[type="date"]::-webkit-calendar-picker-indicator,
  input[type="month"]::-webkit-calendar-picker-indicator{
    filter: invert(70%) sepia(54%) saturate(900%) hue-rotate(335deg) brightness(105%) contrast(101%);
    cursor:pointer;
    padding:4px;
    border-radius:4px;
  }
  .day-line .nom{font-weight:600;}
  .week-sep{
    display:flex;align-items:center;gap:10px;margin:18px 0 8px;
  }
  .week-sep:first-child{margin-top:0;}
  .week-sep .line{flex:1;height:1px;background:var(--line);}
  .week-sep .lbl{font-size:10px;text-transform:uppercase;letter-spacing:1px;color:var(--gray-dim);white-space:nowrap;}

</style>
</head>
<body>
<div id="app">
  <div id="root" class="loading-screen">
    <div class="spinner"></div>
  </div>
</div>
<div id="toast" class="toast"></div>

/* ============== INIT ============== */
const DEFAULT_FIREBASE_URL = "https://cfc-renca-default-rtdb.firebaseio.com";

window.addEventListener('DOMContentLoaded', init);

async function init(){
  const saved = await localGet('firebase-config');
  if(saved && saved.url){
    cfg = saved;
    connectFirebase(cfg.url, ()=> gateAccess());
  } else if(DEFAULT_FIREBASE_URL){
    cfg = { url: DEFAULT_FIREBASE_URL, pin: '' };
    connectFirebase(cfg.url, ()=> gateAccess());
  } else {
    renderSetup();
  }
}

function connectFirebase(url, onReady){
  try{
    if(firebaseApp){ try{ firebase.app().delete(); }catch(e){} }
    firebaseApp = firebase.initializeApp({ databaseURL: url });
    db = firebase.database();
    db.ref('/').once('value').then(snap=>{
      const val = snap.val();
      if(val){
        DATA.programa = val.programa || DATA.programa;
        DATA.turnos = val.turnos || [];
        DATA.avisos = val.avisos || [];
        DATA.actividades = val.actividades || [];
        DATA.lideres = val.lideres || { reuniones: [] };
        DATA.config = Object.assign({}, DATA.config, val.config || {});
        DATA.zonas = val.zonas || SEED_DATA.zonas;
        DATA.lideresCuentas = val.lideresCuentas || [];
        DATA.turnosMes = val.turnosMes || {};
        DATA.predicadores = val.predicadores || ["Pastor Luis Osses"];
        DATA.sloganMes = val.sloganMes || {};
        DATA.fechaPrograma = val.fechaPrograma || "";
        DATA.multimediaRRSS = val.multimediaRRSS || {};
        DATA.predicadoresTurnos = val.predicadoresTurnos || {};
      } else {
        db.ref('/').set(SEED_DATA);
      }
      db.ref('/').on('value', snap2=>{
        const v = snap2.val();
        if(!v) return;
        DATA.programa = v.programa || DATA.programa;
        DATA.turnos = v.turnos || [];
        DATA.avisos = v.avisos || [];
        DATA.actividades = v.actividades || [];
        DATA.lideres = v.lideres || { reuniones: [] };
        DATA.config = Object.assign({}, DATA.config, v.config || {});
        DATA.zonas = v.zonas || DATA.zonas;
        DATA.lideresCuentas = v.lideresCuentas || [];
        DATA.turnosMes = v.turnosMes || {};
        DATA.predicadores = v.predicadores || ["Pastor Luis Osses"];
        DATA.sloganMes = v.sloganMes || {};
        DATA.fechaPrograma = v.fechaPrograma || "";
        DATA.multimediaRRSS = v.multimediaRRSS || {};
        DATA.predicadoresTurnos = v.predicadoresTurnos || {};
        if(document.getElementById('root') && currentTab) renderTab(currentTab);
      });
      onReady();
    }).catch(err=>{
      console.error(err);
      renderSetup("No se pudo conectar a esa URL de Firebase. Verifica que esté bien escrita.");
    });
  }catch(e){
    renderSetup("URL de Firebase inválida.");
  }
}

  root.innerHTML = `

function todayStr(){
  const hoy = new Date();
  return `${hoy.getFullYear()}-${String(hoy.getMonth()+1).padStart(2,'0')}-${String(hoy.getDate()).padStart(2,'0')}`;
}
function getProximoTurnoFecha(){
  const hoy = new Date();
  const ts = todayStr();
  let candidatos = [];
  for(let offset=0; offset<=2; offset++){
    const d = new Date(hoy.getFullYear(), hoy.getMonth()+offset, 1);
    const mk = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
    const tm = DATA.turnosMes[mk];
    if(tm && tm.dias && tm.dias.length) candidatos.push(...tm.dias.map(f=>({fecha:f, mesKey:mk})));
    const pt = DATA.predicadoresTurnos && DATA.predicadoresTurnos[mk];
    if(pt && pt.length) candidatos.push(...pt.map(t=>({fecha:t.fecha, mesKey:mk})));
  }
  candidatos = candidatos.filter(cnd=> cnd.fecha >= ts).sort((a,b)=> a.fecha.localeCompare(b.fecha));
  return candidatos[0] || null;
}
function formatFechaTitulo(f){
  if(!f) return '';
  const [y,m,d] = f.split('-').map(Number);
  const dias = ['domingo','lunes','martes','miércoles','jueves','viernes','sábado'];
  const meses = ['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'];
  return `${dias[new Date(y,m-1,d).getDay()]} ${d} de ${meses[m-1]} ${y}`.toUpperCase();
}

    <div class="role-card">

/* vista Calendario del mes */
function renderTurnosCalendario(content){
  const hoy = new Date();
  const mesKey = turnosMesActual || `${hoy.getFullYear()}-${String(hoy.getMonth()+1).padStart(2,'0')}`;
  turnosMesActual = mesKey;
  const turnosMes = DATA.turnosMes[mesKey] || {dias:[], asignaciones:[]};
  const dias = (turnosMes.dias||[]).slice().sort();
  const zonasPorId = {};
  (DATA.zonas||[]).forEach(z=> zonasPorId[z.id] = z.nombre);

  content.innerHTML = `
    <div class="form-grid" style="margin-bottom:10px;">
      <input id="turnos-mes-input" type="month" value="${mesKey}">
    </div>
    <div class="search-box">
      <input id="turnos-busca-nombre" placeholder="Busca tu nombre para resaltar tus turnos">
    </div>
    <div id="turnos-dias-list">
      ${dias.length? dias.map((fecha,idx)=>{
        const asigDia = (turnosMes.asignaciones||[]).filter(a=> a.fecha===fecha);
        const porZona = {};
        asigDia.forEach(a=>{ if(!porZona[a.zona]) porZona[a.zona]=[]; porZona[a.zona].push(a); });
        const wk = getWeekKey(fecha);
        const wkAnterior = idx>0? getWeekKey(dias[idx-1]) : null;
        const sep = (wk!==wkAnterior)? `<div class="week-sep"><span class="line"></span><span class="lbl">Semana del ${formatFecha(wk)}</span><span class="line"></span></div>` : '';
        return `
          ${sep}
          <div class="day-card">
            <p class="day-title">${formatFechaLarga(fecha)}</p>
            ${Object.keys(porZona).map(zid=>`
              <p class="day-zona">${zonasPorId[zid]||zid}</p>
              ${porZona[zid].map(a=>`
                <div class="day-line" data-nombre="${(a.nombre||'').toLowerCase()}" style="${!a.nombre?'background:rgba(192,82,74,.12);':''}" >
                  <span class="rol">${a.rol}</span>
                  <span class="nom" style="${!a.nombre?'color:var(--danger);':''}">${a.nombre || '⚠️ Debe asignarse alguien'}</span>
                </div>
              `).join('')}
            `).join('')}
          </div>
        `;
      }).join('') : `<div class="empty">Aún no hay turnos generados para este mes. Pídele a tu líder de zona que los genere desde "Líderes".</div>`}
    </div>
  `;
  document.getElementById('turnos-mes-input').onchange = (e)=>{
    turnosMesActual = e.target.value || mesKey;
    renderTurnosCalendario(content);
  };
  document.getElementById('turnos-busca-nombre').oninput = (e)=>{
    const q = e.target.value.trim().toLowerCase();
    document.querySelectorAll('#turnos-dias-list .day-line').forEach(line=>{
      line.classList.toggle('me', q.length>1 && line.dataset.nombre.includes(q));
    });
  };
}
function getWeekKey(f){
  if(!f) return '';
  const [y,m,d] = f.split('-').map(Number);
  const dt = new Date(y, m-1, d);
  const day = dt.getDay();
  const diffToMonday = (day===0? -6 : 1-day);
  const monday = new Date(dt); monday.setDate(dt.getDate()+diffToMonday);
  return `${monday.getFullYear()}-${String(monday.getMonth()+1).padStart(2,'0')}-${String(monday.getDate()).padStart(2,'0')}`;
}
function formatFechaLarga(f){
  if(!f) return '';
  const [y,m,d] = f.split('-').map(Number);
  const dias = ['domingo','lunes','martes','miércoles','jueves','viernes','sábado'];
  const meses = ['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'];
  return `${dias[new Date(y,m-1,d).getDay()]} ${d} de ${meses[m-1]}`;
}

function sugerirFechas(mesKey, weekdays){
  const [y,m] = mesKey.split('-').map(Number);
  const last = new Date(y, m, 0).getDate();
  const fechas = [];
  for(let day=1; day<=last; day++){
    const d = new Date(y, m-1, day);
    if((weekdays||[]).includes(d.getDay())) fechas.push(`${y}-${String(m).padStart(2,'0')}-${String(day).padStart(2,'0')}`);
  }
  return fechas;
}

function generarSugeridoZona(zonaId, mesKey, fechas){
  const zona = DATA.zonas.find(z=>z.id===zonaId);
  if(!zona) return;
  const turnosMes = DATA.turnosMes[mesKey] || {dias:[], asignaciones:[]};
  const ocupado = {};
  (turnosMes.asignaciones||[]).forEach(a=>{
    if(a.zona !== zonaId && a.nombre){
      if(!ocupado[a.fecha]) ocupado[a.fecha] = new Set();
      ocupado[a.fecha].add(a.nombre);
    }
  });
  const servidores = (zona.servidores||[]).slice();
  let cursor = 0;
  const nuevas = [];
  fechas.slice().sort().forEach(fecha=>{
    const usadosHoy = new Set();
    (zona.roles||[]).forEach(rol=>{
      let elegido = '';
      if(servidores.length){
        let intentos = 0;
        while(intentos < servidores.length){
          const candidato = servidores[cursor % servidores.length];
          cursor++; intentos++;
          const ocupadoOtraZona = ocupado[fecha] && ocupado[fecha].has(candidato);
          if(!ocupadoOtraZona && !usadosHoy.has(candidato)){ elegido = candidato; break; }
        }
      }
      if(elegido){
        usadosHoy.add(elegido);
        if(!ocupado[fecha]) ocupado[fecha] = new Set();
        ocupado[fecha].add(elegido);
      }
      nuevas.push({fecha, zona: zonaId, rol, nombre: elegido});
    });
  });
  const otras = (turnosMes.asignaciones||[]).filter(a=> a.zona !== zonaId);
  const diasUnion = Array.from(new Set([...(turnosMes.dias||[]), ...fechas])).sort();
  db.ref('turnosMes/'+mesKey).set({ dias: diasUnion, asignaciones: [...otras, ...nuevas] });
  toast('Turno sugerido generado, revísalo abajo');
}

function bindLockKeypad(container, onComplete){
  let entered = '';
  const dots = container.querySelectorAll('#pin-dots span');
  container.querySelectorAll('#keypad button[data-n]').forEach(b=>{
    b.onclick = ()=>{
      const n = b.dataset.n;
      if(n==='back'){ entered = entered.slice(0,-1); }
      else if(entered.length<4){ entered += n; }
      dots.forEach((d,i)=> d.classList.toggle('filled', i<entered.length));
      if(entered.length===4){
        setTimeout(()=>{ onComplete(entered); entered=''; dots.forEach(d=>d.classList.remove('filled')); }, 150);
      }
    };
  });
}

      </div>

      <p class="tag" style="margin-bottom:4px;">Turnos del equipo (semana/domingo)</p>
      <p style="font-size:11px;color:var(--gray-dim);margin:0 0 10px;">Esto se rellena automáticamente desde cada zona en "Líderes" → Zonas → Generar turno del mes. Aquí puedes revisarlo y corregir un nombre puntual si hace falta.</p>
      <div id="adm-turnos-dias">
        ${dias.length? dias.map((fecha,idx)=>{
          const asigDia = (turnosMes.asignaciones||[]).filter(a=> a.fecha===fecha);
          const wk = getWeekKey(fecha);
          const wkAnt = idx>0? getWeekKey(dias[idx-1]) : null;
          const sep = (wk!==wkAnt)? `<div class="week-sep"><span class="line"></span><span class="lbl">Semana del ${formatFecha(wk)}</span><span class="line"></span></div>` : '';

            ${sep}
            <div class="day-card">
              <p class="day-title">${formatFechaLarga(fecha)}</p>
              ${asigDia.map(a=>{
                const zona = zonaMap[a.zona];
                const gi = (turnosMes.asignaciones||[]).indexOf(a);
                return `
                <div class="row2" style="align-items:center;margin-bottom:6px;">
                  <div>
                    <span class="tag">${zonasPorId[a.zona]||a.zona}</span>
                    <p style="margin:2px 0 0;font-size:12.5px;color:var(--gray);">${a.rol}</p>

                </div>`;
              }).join('')}
            </div>
          `;

    const v = document.getElementById('new-pred').value.trim();
    if(!v) return;
    const arr = (DATA.predicadores||[]).slice();
    arr.push(v);
    db.ref('predicadores').set(arr); toast('Predicador agregado');
  };

    const i = parseInt(b.dataset.delPred);

    db.ref('predicadores').set(arr); toast('Eliminado');

        <button class="btn" id="m-save">Guardar</button>
      </div>
    `);
    document.getElementById('m-cancel').onclick = closeModal;
    document.getElementById('m-save').onclick = ()=>{
      const nuevo = document.getElementById('m-pred-nom').value.trim();
      if(!nuevo) return;
      const arr = (DATA.predicadores||[]).slice(); arr[i]=nuevo;
      db.ref('predicadores').set(arr); closeModal(); toast('Guardado');
    };
  });

  document.getElementById('add-pred-turno').onclick = ()=>{
    const fecha = document.getElementById('adm-pred-fecha').value;
    const nombre = document.getElementById('adm-pred-nombre').value;
    if(!fecha){ toast('Selecciona una fecha'); return; }

  };

    const arr = turnosPredMes.slice(); arr.splice(i,1);
    const update = Object.assign({}, DATA.predicadoresTurnos||{}, {[mesKey]: arr});
    db.ref('predicadoresTurnos').set(update); toast('Eliminado');
  });

  const saveBtn = document.getElementById('adm-turnos-save');
  if(saveBtn) saveBtn.onclick = ()=>{
    const asignacionesCopy = (turnosMes.asignaciones||[]).slice();
    c.querySelectorAll('[data-gidx]').forEach(sel=>{

      asignacionesCopy[gi] = Object.assign({}, asignacionesCopy[gi], {nombre: sel.value});
    });

    toast('Turnos guardados');
  };
}

function slugify(s){
  return (s||'').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[^a-z0-9]+/g,'-').replace(/(^-|-$)/g,'') || ('zona-'+Date.now());
}
function openZonaModal(idx){
  const isNew = idx===null;
  const z = isNew? {id:'',nombre:'',roles:[],servidores:[]} : DATA.zonas[idx];
  openModal(`
    <h3>${isNew?'Nueva zona':'Editar zona'}</h3>
    <div class="form-grid">
      <div><label style="font-size:11px;color:var(--gray);">Nombre de la zona</label><input id="m-nombre" value="${z.nombre||''}" placeholder="Ujieres"></div>
      <div><label style="font-size:11px;color:var(--gray);">Roles (uno por línea)</label><textarea id="m-roles" rows="4">${(z.roles||[]).join('\n')}</textarea></div>
      <div><label style="font-size:11px;color:var(--gray);">Servidores (uno por línea)</label><textarea id="m-servidores" rows="4">${(z.servidores||[]).join('\n')}</textarea></div>
    </div>
    <div class="modal-actions">
      <button class="btn btn-outline" id="m-cancel">Cancelar</button>
      <button class="btn" id="m-save">Guardar</button>
    </div>
  `);
  document.getElementById('m-cancel').onclick = closeModal;
  document.getElementById('m-save').onclick = ()=>{
    const nombre = document.getElementById('m-nombre').value.trim();
    if(!nombre){ toast('Escribe un nombre de zona'); return; }
    const roles = document.getElementById('m-roles').value.split('\n').map(s=>s.trim()).filter(Boolean);
    const servidores = document.getElementById('m-servidores').value.split('\n').map(s=>s.trim()).filter(Boolean);
    const id = isNew? slugify(nombre) : z.id;
    const nuevaZona = {id, nombre, roles, servidores};
    const arr = (DATA.zonas||[]).slice();
    if(isNew) arr.push(nuevaZona); else arr[idx] = nuevaZona;
    db.ref('zonas').set(arr);
    closeModal(); toast('Guardado');
  };
}

        <div><label style="font-size:11px;color:var(--gray);">Hora</label><input id="m-hora" value="${r.hora||''}" placeholder="20:00"></div>
      </div>
      <div><label style="font-size:11px;color:var(--gray);">Modalidad</label>
        <select id="m-mod">
          <option value="presencial" ${r.modalidad==='presencial'?'selected':''}>Presencial</option>
          <option value="online" ${r.modalidad==='online'?'selected':''}>Online</option>
        </select>
      </div>
      <div><label style="font-size:11px;color:var(--gray);">Título</label><input id="m-tit" value="${r.titulo||''}"></div>
      <div><label style="font-size:11px;color:var(--gray);">Nota</label><textarea id="m-nota">${r.nota||''}</textarea></div>
    </div>
    <div class="modal-actions">
      <button class="btn btn-outline" id="m-cancel">Cancelar</button>
      <button class="btn" id="m-save">Guardar</button>
    </div>
  `);
  document.getElementById('m-cancel').onclick = closeModal;
  document.getElementById('m-save').onclick = ()=>{
    const newR = {
      fecha: document.getElementById('m-fecha').value,
      hora: document.getElementById('m-hora').value,
      modalidad: document.getElementById('m-mod').value,
      titulo: document.getElementById('m-tit').value,
      nota: document.getElementById('m-nota').value,
    };
    const arr = (DATA.lideres.reuniones||[]).slice();
    if(isNew) arr.push(newR); else arr[idx]=newR;
    db.ref('lideres/reuniones').set(arr);
    closeModal(); toast('Guardado');
  };
}

    <div class="card">
      <div class="form-grid">
        <div><label style="font-size:11px;color:var(--gray);">Nombre de la iglesia</label><input id="cfg-name" value="${DATA.config.churchName||''}"></div>

    </div>
    <div class="card">
      <p class="tag" style="margin-bottom:8px;">Para servidores (~50 personas)</p>
      <div class="form-grid">
        <div><label style="font-size:11px;color:var(--gray);">Clave de entrada general</label><input id="cfg-access" maxlength="4" value="${DATA.config.accessPin||''}"></div>
      </div>
      <p style="font-size:11px;color:var(--gray-dim);margin:0;">Es la clave que se pide al abrir la app por primera vez en cada dispositivo.</p>
    </div>
    <div class="card">
      <p class="tag" style="margin-bottom:8px;">Para pastores (acceso total a Líderes)</p>
      <div class="form-grid">
        <div><label style="font-size:11px;color:var(--gray);">Clave general de Líderes</label><input id="cfg-leader" maxlength="4" value="${DATA.config.leaderPin||''}"></div>
        <div><label style="font-size:11px;color:var(--gray);">Texto de pastores (se ve arriba en Líderes)</label><input id="cfg-pastores" value="${DATA.config.pastoresBase||''}"></div>
      </div>
    </div>
    <div class="card">
      <p class="tag" style="margin-bottom:8px;">Turno mensual</p>
      <div class="form-grid">
        <div>
          <label style="font-size:11px;color:var(--gray);">Días sugeridos por defecto al generar turnos</label>
          <div class="chip-list" style="margin-top:6px;">
            ${diasNombres.map((nombre,i)=>`
              <label class="chip" style="cursor:pointer;">
                <input type="checkbox" value="${i}" id="cfg-dia-${i}" ${(DATA.config.diasTurnoDefault||[]).includes(i)?'checked':''} style="width:auto;margin:0;"> ${nombre}
              </label>
            `).join('')}
          </div>
        </div>
      </div>
    </div>
    <div class="card">
      <p class="tag" style="margin-bottom:8px;">Para pastores</p>
      <div class="form-grid">
        <div><label style="font-size:11px;color:var(--gray);">Clave de Admin</label><input id="cfg-pin" maxlength="4" value="${DATA.config.pin||''}"></div>
      </div>
    </div>
    <button class="btn" id="cfg-save">Guardar ajustes</button>
    <div class="card" style="margin-top:14px;">
      <p style="font-size:12px;color:var(--gray);margin:0 0 10px;">URL de Firebase conectada:</p>
      <p style="font-size:12px;word-break:break-all;color:var(--gray-dim);margin:0 0 12px;">${cfg.url}</p>
      <button class="btn btn-outline" id="cfg-disconnect">Cerrar acceso en este dispositivo</button>
    </div>
  `;
  document.getElementById('cfg-save').onclick = ()=>{
    const name = document.getElementById('cfg-name').value;
    const accessPin = document.getElementById('cfg-access').value || '1234';
    const leaderPin = document.getElementById('cfg-leader').value || '1234';
    const pin = document.getElementById('cfg-pin').value || '1234';
    const pastoresBase = document.getElementById('cfg-pastores').value || 'Pastores';
    const diasTurnoDefault = diasNombres.map((_,i)=>i).filter(i=> document.getElementById('cfg-dia-'+i).checked);
    db.ref('config').set({ churchName: name, accessPin, leaderPin, pin, pastoresBase, diasTurnoDefault });
    toast('Ajustes guardados');
  };
  document.getElementById('cfg-disconnect').onclick = async ()=>{
    await localSet('firebase-config', null);
    await localSet('access-unlocked', null);
    location.reload();
  };
}

/* ============== MODAL helper ============== */
function openModal(html){
  let bg = document.getElementById('modal-bg');
  if(!bg){
    bg = document.createElement('div');
    bg.id = 'modal-bg';
    bg.className = 'modal-bg';
    document.body.appendChild(bg);
  }
  bg.innerHTML = `<div class="modal">${html}</div>`;
  bg.style.display = 'flex';
  bg.onclick = (e)=>{ if(e.target===bg) closeModal(); };
}
function closeModal(){
  const bg = document.getElementById('modal-bg');
  if(bg) bg.style.display = 'none';
}
</script>
